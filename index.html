<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kani | cantmute.me</title>

  <!-- Social/SEO meta -->
  <meta property="og:title" content="Kani | cantmute.me">
  <meta property="og:description" content="can't mute me. listen now.">
  <meta property="og:type" content="website">
  <meta name="description" content="Kani's music portfolio. Stream tracks, discover new releases.">
  <meta name="theme-color" content="#050505">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <!-- b052 — importmap so three.js examples/jsm modules (postprocessing/*)
       can resolve their bare 'three' imports against the same unpkg CDN.
       Only used by ?style=v2 stylization pipeline; the default villa view
       (which uses absolute import URLs) is unaffected. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- Top bar -->
  <header class="top-bar">
    <div class="top-left">
      <div class="brand">Kani</div>
      <div class="brand-sub" id="brandSub">Sound terrain / <span id="trackCount">0</span> tracks</div>
    </div>
    <div class="top-right">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="search tracks..." autocomplete="off">
      </div>
      <div class="view-tabs">
        <button class="view-tab active" data-view="dimensions">Dimensions</button>
        <button class="view-tab" data-view="livingwall">Living Wall</button>
        <button class="view-tab" data-view="organism">Organism</button>
        <button class="view-tab" data-view="freqmap">Freq Map</button>
        <button class="view-tab" data-view="tapespine">Tape Spine</button>
        <button class="view-tab" data-view="wall">Wall</button>
        <button class="view-tab" data-view="terrain">Terrain</button>
        <button class="view-tab" data-view="deepsea">Deep Sea</button>
        <button class="view-tab" data-view="neural">Neural</button>
        <button class="view-tab" data-view="villa">Villa</button>
      </div>
      <a href="/tracks" class="view-tab" title="Browse all tracks">Tracks</a>
      <button class="theme-toggle" id="themeToggle" title="Toggle light/dark">☀</button>
      <a href="https://instagram.com/seankani" target="_blank" rel="noopener" class="social-btn" title="Instagram">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
      </a>
    </div>
  </header>

  <!-- Mobile view tabs (shown only on mobile, positioned at bottom above player) -->
  <div class="mobile-view-tabs" id="mobileViewTabs">
    <button class="view-tab active" data-view="dimensions">Dimensions</button>
    <button class="view-tab" data-view="livingwall">Living Wall</button>
    <button class="view-tab" data-view="organism">Organism</button>
    <button class="view-tab" data-view="freqmap">Freq Map</button>
    <button class="view-tab" data-view="tapespine">Tape Spine</button>
    <button class="view-tab" data-view="wall">Wall</button>
    <button class="view-tab" data-view="terrain">Terrain</button>
    <button class="view-tab" data-view="deepsea">Deep Sea</button>
    <button class="view-tab" data-view="neural">Neural</button>
    <button class="view-tab" data-view="villa">Villa</button>
  </div>

  <!-- View container - views mount/unmount here -->
  <main class="view-container" id="viewContainer"></main>

  <!-- Player bar -->
  <div class="player-bar" id="playerBar">
    <div class="player-mobile-progress" id="mobileProgress"></div>
    <div class="player-inner">
      <div class="player-track-info" id="playerTrackInfo" style="cursor:pointer" title="Double-click for track info">
        <div class="player-art" id="playerArt"></div>
        <div class="player-meta">
          <div class="player-title" id="playerTitle">Select a track</div>
          <div class="player-artist">Kani</div>
        </div>
      </div>
      <div class="player-controls">
        <button class="ctrl-btn" id="prevBtn" title="Previous">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 20L9 12l10-8v16z"/><path d="M5 4v16"/></svg>
        </button>
        <button class="play-btn" id="playPauseBtn" title="Play / Pause">
          <svg class="icon-play" width="16" height="16" viewBox="0 0 24 24" fill="#fff"><polygon points="8,4 20,12 8,20"/></svg>
          <svg class="icon-pause" width="16" height="16" viewBox="0 0 24 24" fill="#fff" style="display:none"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
        </button>
        <button class="ctrl-btn" id="nextBtn" title="Next">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 4l10 8-10 8V4z"/><path d="M19 4v16"/></svg>
        </button>
      </div>
      <div class="player-seek">
        <span class="seek-time" id="timeCurrent">0:00</span>
        <div class="seek-track" id="seekTrack">
          <div class="seek-fill" id="seekFill"></div>
        </div>
        <span class="seek-time" id="timeTotal">0:00</span>
      </div>
      <div class="player-extra">
        <button class="ctrl-btn" id="shuffleBtn" title="Shuffle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        </button>
        <button class="ctrl-btn" id="repeatBtn" title="Repeat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
        <div class="volume-wrap">
          <button class="ctrl-btn" id="volumeBtn" title="Volume">
            <svg class="icon-vol" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            <svg class="icon-mute" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
          </button>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts loaded in order -->
  <script src="js/helpers.js"></script>
  <script src="js/app.js"></script>
  <script src="js/player.js"></script>
  <script src="js/terrain.js"></script>
  <script src="js/deepsea.js"></script>
  <script src="js/neural.js"></script>
  <script src="js/wall.js"></script>
  <script src="js/living-wall.js"></script>
  <script src="js/organism.js"></script>
  <script src="js/frequency-map.js"></script>
  <script src="js/tape-spine.js"></script>
  <script src="js/scenes.js"></script>
  <script src="js/dimensions.js"></script>
  <script src="js/world.js"></script>
  <script src="js/world-paint.js"></script>
  <script src="js/world-marathon.js"></script>
</body>
</html>
