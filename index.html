<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B4TTL | Music Portfolio</title>

    <!-- Social sharing meta tags - update these with your info -->
    <meta property="og:title" content="B4TTL | Music Portfolio">
    <meta property="og:description" content="Listen to my latest tracks">
    <meta property="og:type" content="website">
    <meta name="description" content="Official music portfolio. Stream tracks, discover new releases.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ======== HERO SECTION ======== -->
    <section class="hero" id="hero">
        <div class="hero-bg">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
        </div>
        <div class="hero-content">
            <!-- CHANGE YOUR ARTIST NAME HERE -->
            <h1 class="hero-title">B4TTL</h1>
            <p class="hero-subtitle">music portfolio</p>
            <div class="hero-stats">
                <span class="stat" id="trackCount">0 tracks</span>
            </div>
            <a href="#tracks" class="hero-cta">
                <span>Listen Now</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
            </a>
        </div>
        <div class="hero-socials">
            <!-- UPDATE YOUR SOCIAL LINKS HERE -->
            <a href="https://instagram.com/YOUR_HANDLE" target="_blank" rel="noopener" class="social-link" title="Instagram">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
            </a>
        </div>
    </section>

    <!-- ======== TRACKS SECTION ======== -->
    <section class="tracks-section" id="tracks">
        <div class="tracks-header">
            <h2 class="section-title">All Tracks</h2>
            <div class="search-wrap">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="searchInput" class="search-input" placeholder="Search tracks..." autocomplete="off">
            </div>
            <button class="shuffle-all-btn" id="shuffleAllBtn" title="Shuffle all tracks">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
                Shuffle Play
            </button>
        </div>
        <div class="track-grid" id="trackGrid">
            <!-- Tracks rendered by JS -->
        </div>
        <p class="no-results" id="noResults">No tracks found.</p>
    </section>

    <!-- ======== PLAYER BAR ======== -->
    <div class="player-bar" id="playerBar">
        <canvas class="visualizer" id="visualizer"></canvas>
        <div class="player-inner">
            <div class="player-track-info">
                <div class="player-thumb" id="playerThumb"></div>
                <div class="player-meta">
                    <span class="player-title" id="playerTitle">Select a track</span>
                </div>
            </div>
            <div class="player-controls">
                <button class="ctrl-btn" id="prevBtn" title="Previous">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button class="ctrl-btn play-btn" id="playPauseBtn" title="Play / Pause">
                    <svg class="icon-play" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    <svg class="icon-pause" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
                </button>
                <button class="ctrl-btn" id="nextBtn" title="Next">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>
            <div class="player-progress-wrap">
                <span class="time-current" id="timeCurrent">0:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-filled" id="progressFilled"></div>
                </div>
                <span class="time-total" id="timeTotal">0:00</span>
            </div>
            <div class="player-extra">
                <button class="ctrl-btn" id="shuffleBtn" title="Shuffle">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
                </button>
                <button class="ctrl-btn" id="repeatBtn" title="Repeat">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                </button>
                <div class="volume-wrap">
                    <button class="ctrl-btn" id="volumeBtn" title="Volume">
                        <svg class="icon-vol" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                        <svg class="icon-mute" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
                    </button>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
